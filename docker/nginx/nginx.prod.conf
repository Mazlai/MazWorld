server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # TODO: remplacer par le nom de domaine réel une fois le VPS/DNS provisionnés
    ssl_certificate     /etc/letsencrypt/live/mazworld.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mazworld.example.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /api {
        fastcgi_pass backend:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/public;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
