security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            id: App\Security\UserProvider

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        auth:
            pattern: ^/api/auth/(discord|refresh)
            stateless: true
            security: false

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~
            custom_authenticators:
                - App\Security\BotAuthenticator

        main:
            lazy: true

    access_control:
        - { path: ^/api/auth/discord, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/verify, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/me, roles: ROLE_USER }
        - { path: ^/api/auth/refresh, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/logout, roles: ROLE_USER }
        - { path: ^/api/profile, roles: ROLE_USER }
        - { path: ^/api/travel, roles: ROLE_USER }
        - { path: ^/api/commands, roles: ROLE_USER }
        - { path: ^/api/shop/purchase, roles: ROLE_USER }
        - { path: ^/api/leaderboard/me, roles: ROLE_USER }
        - { path: ^/api/leaderboard$, roles: PUBLIC_ACCESS }
        - { path: ^/api/records, roles: ROLE_USER }
        - { path: ^/api/servers, roles: ROLE_USER }
        - { path: ^/api/bot/status, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
