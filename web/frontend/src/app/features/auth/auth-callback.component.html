<div class="callback-page">
  @if (isLoading()) {
    <div class="callback-state">
      <span class="loading"></span>
      <p>Connexion en cours…</p>
    </div>
  } @else if (error()) {
    <div class="callback-state callback-state--error">
      <p class="error-message">{{ error() }}</p>
      <button class="btn-primary" (click)="retry()">Réessayer</button>
    </div>
  } @else {
    <div class="callback-state callback-state--success">
      <p>Bienvenue, <strong>{{ successUsername() }}</strong> !</p>
      <p class="redirect-hint">Redirection en cours…</p>
    </div>
  }
</div>
