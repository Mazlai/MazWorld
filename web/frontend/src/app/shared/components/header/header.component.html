<header class="site-header">
  <div class="container site-header__inner">
    <a routerLink="/" class="site-header__logo">
      <span class="text-gradient">MazWorld</span>
    </a>

    <nav class="site-header__nav" aria-label="Navigation principale">
      @if (auth.isAuthenticated()) {
        <a routerLink="/map"      routerLinkActive="active">Carte</a>
        <a routerLink="/shop"     routerLinkActive="active">Boutique</a>
      }
      <a routerLink="/leaderboard" routerLinkActive="active">Classement</a>
      <a routerLink="/commands"    routerLinkActive="active">Commandes</a>
    </nav>

    <div class="site-header__actions">
      @if (auth.isLoading()) {
        <app-spinner size="sm" />
      } @else if (auth.isAuthenticated()) {
        <app-avatar [src]="auth.userAvatar()" [alt]="auth.displayName() ?? 'Avatar'" size="sm" />
        <a routerLink="/dashboard" class="site-header__username">{{ auth.displayName() }}</a>
        <button class="btn-ghost" (click)="logout()">Déconnexion</button>
      } @else {
        <button class="btn-discord" (click)="login()">Connexion Discord</button>
      }
    </div>
  </div>
</header>
