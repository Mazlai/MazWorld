services:
  nginx:
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

  backend:
    env_file: .env.prod
    restart: unless-stopped

  mysql:
    env_file: .env.prod
    restart: unless-stopped

  bot:
    env_file: .env.prod
    restart: unless-stopped
